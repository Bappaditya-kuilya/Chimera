<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chimera — Causal Security Runtime</title>
    <style>
      :root {
        --bg: #0d1117; --panel: #161b22; --line: #30363d; --ink: #e6edf3; --dim: #8b949e;
        --healthy: #2ecc71; --alert: #f1c40f; --exposed: #e67e22; --isolated: #58a6ff;
        --scarred: #a371f7; --dead: #f85149; --edge: #3d444d;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--ink);
        font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      header { padding: 18px 24px 6px; }
      h1 { margin: 0; font-size: 20px; letter-spacing: .3px; }
      .sub { color: var(--dim); margin: 4px 0 0; font-size: 13px; }
      .controls { padding: 14px 24px; display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
      .controls .tick { color: var(--dim); }
      input[type="range"] { width: min(560px, 60vw); accent-color: var(--scarred); }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 8px 24px 28px; }
      .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px; }
      .panel h2 { margin: 0 0 4px; font-size: 14px; }
      .panel .tag { color: var(--dim); font-size: 12px; }
      .verdict { float: right; font-weight: 700; padding: 2px 10px; border-radius: 999px; font-size: 12px; }
      .v-survived { background: rgba(46,204,113,.15); color: var(--healthy); border: 1px solid var(--healthy); }
      .v-collapsed { background: rgba(248,81,73,.15); color: var(--dead); border: 1px solid var(--dead); }
      svg { width: 100%; height: 230px; display: block; }
      .node-label { fill: var(--ink); font-size: 11px; }
      .node-trust { fill: var(--dim); font-size: 10px; }
      .log { margin-top: 8px; max-height: 180px; overflow: auto; font-size: 12px; }
      .log div { padding: 1px 0; color: var(--dim); }
      .log .obs { color: var(--ink); }
      .log .dec { color: var(--scarred); }
      .log .bad { color: var(--dead); }
      .legend { padding: 0 24px 24px; color: var(--dim); font-size: 12px; display: flex; gap: 14px; flex-wrap: wrap; }
      .legend span::before { content: "●"; margin-right: 5px; }
      .diverge { padding: 0 24px 8px; color: var(--alert); font-size: 13px; min-height: 20px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Chimera — Causal Security Runtime</h1>
      <p class="sub">Identical observations. One policy SURVIVES; do(Quarantine = false) COLLAPSES. Scrub time to watch them diverge.</p>
    </header>
    <div class="controls">
      <label>tick <input id="scrub" type="range" min="0" value="0" /></label>
      <span class="tick">t<span id="tickval">0</span> / <span id="tickmax">0</span></span>
    </div>
    <div class="diverge" id="diverge"></div>
    <div class="grid">
      <div class="panel" id="panel-actual"></div>
      <div class="panel" id="panel-cf"></div>
    </div>
    <div class="legend">
      <span style="color:var(--healthy)">HEALTHY</span>
      <span style="color:var(--alert)">ALERT</span>
      <span style="color:var(--exposed)">EXPOSED</span>
      <span style="color:var(--isolated)">ISOLATED</span>
      <span style="color:var(--scarred)">SCARRED</span>
      <span style="color:var(--dead)">infected / collapsed</span>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
